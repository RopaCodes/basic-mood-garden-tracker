<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- stylesheet -->
    <link rel="stylesheet" href="styles.css" />

    <!-- font awesome -->
    <script
      src="https://kit.fontawesome.com/fb9f288e05.js"
      crossorigin="anonymous"
    ></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />

    <title>mood garden</title>
  </head>
  <body>
    <div class="main_pg_container">
      <h1 class="title">mood garden</h1>
      <div class="ui_container">
        <a href="./index.html" class="back_desktop"><i class="fa-solid fa-caret-left"></i></i></a>
        <div class="garden_patch">
          <img src="./assets/grass.PNG" alt="grass patch" class="grass_patch"/>
          <div class="flowers">
            <!-- <img src="./assets/LilyOfTheValley.png" alt="">
            <img src="./assets/LilyOfTheValley.png" alt=""> -->
          </div>
        </div>

            <i class="fa-solid fa-caret-right"></i>
          </div>
          <div class="flower_emotions" id="flowersId">
            <div class="days_circles">

                <div class="day" data-index="17" id="day_id" onclick="clickedCircle()"></div>

            <a href="./index.html"><i class="fa-solid fa-caret-left"></i></i></a>
            <div class="flower_emotions_mobile"></div>

      </div>
      <div class="dialog_prompt" id="pick_dialog">
        <p class="dialog_ques">How are you feeling today?</p>
        <div class="emotions_log">
            <p>Ecstatic</p>
